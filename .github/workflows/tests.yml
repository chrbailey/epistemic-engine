name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Most of this repo's test suite depends on private packages not on PyPI
# (belief_math, guardian, truth_validator, truth_layer). Public CI only
# runs the one test file with no private-dep imports:
# tests/test_efc_llm_integration.py. Full suite runs locally on the
# author's machine where those packages are present.
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
      - name: Run public-CI-eligible tests
        run: python -m pytest tests/test_efc_llm_integration.py -v --tb=short
