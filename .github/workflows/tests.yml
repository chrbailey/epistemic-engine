name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install pytest
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      # test_ewm_all.py imports belief_math, which is a private package not
      # on PyPI. Exclude it from public CI; it runs locally when belief-math
      # is available.
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/test_ewm_all.py
