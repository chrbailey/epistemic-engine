# Code snippets - reusable patterns detected
code_patterns:
  - name: "API Client Pattern"
    language: "python"
    found_in:
      - "unified-belief-system/multi_feed_outliers.py"
      - "unified-belief-system/rumor_feeds.py"
    pattern: |
      class {Name}Client:
          BASE_URL = "..."
          def fetch(self, **params) -> List[Dict]:
              url = f"{self.BASE_URL}?" + urllib.parse.urlencode(params)
              with urllib.request.urlopen(url, timeout=10) as resp:
                  return json.loads(resp.read().decode())

  - name: "Dataclass with Properties"
    language: "python"
    found_in:
      - "unified-belief-system/truth_layer.py"
    pattern: |
      @dataclass
      class {Name}:
          field: type = default
          @property
          def computed(self) -> type:
              return self.field / something

# Configurations - dotfiles, settings
configs:
  shell:
    - path: "~/.zshrc"
      host: "macbook-pro"
      aliases:
        - "ll=ls -la"
        - "gst=git status"
      exports:
        - "PATH"
        - "EDITOR"

  git:
    - path: "~/.gitconfig"
      host: "macbook-pro"
      user_email: "chris@example.com"
      default_branch: "main"

  editors:
    - name: "VS Code"
      settings_path: "~/Library/Application Support/Code/User/settings.json"
      extensions_count: 42
      theme: "One Dark Pro"

# Credentials/secrets locations (paths only, never contents)
sensitive_paths:
  - "~/.ssh/"
  - "~/.aws/"
  - "~/.env"
  - "~/Dropbox/Credentials/"
  note: "These paths contain sensitive data - never index contents"

# Recent activity - what you've been working on
recent_activity:
